  <style>
    :root{--b:#073b8f;--bb:#1268e8;--g:#22a447;--y:#ffd21f;--i:#102f59;--s:#eef7ff}*{box-sizing:border-box}body{margin:0;background:var(--s);color:var(--i);font-family:"Trebuchet MS",Arial,sans-serif}button,input{font:inherit}.hero{color:#fff;background:radial-gradient(circle at 35% -30%,#1678ee 0,transparent 44%),linear-gradient(135deg,#032d72,#0753ba);border-bottom:9px solid var(--y)}.hero-in{max-width:1320px;margin:auto;padding:48px;display:grid;grid-template-columns:1.3fr 1fr;gap:60px;align-items:center}.tag{display:inline-block;margin:0 0 10px;padding:8px 16px;background:var(--g);border-radius:99px;font-weight:900;text-transform:uppercase;box-shadow:0 5px 0 #08732b}h1{margin:0;font-size:clamp(2.5rem,5vw,4.7rem);line-height:.94;letter-spacing:-.05em;text-shadow:0 6px 0 #03235a}h1 span{color:var(--y)}.hint{font-weight:700;color:#ddebff}.score{border:3px solid #6cb0ff;border-radius:28px;padding:28px;background:linear-gradient(145deg,#1875ed,#0754c9);box-shadow:0 12px 0 #032d72}.scoreline{font-size:1.35rem;font-weight:900}.scoreline strong{font-size:2.4rem;color:var(--y)}.bar{height:20px;border:4px solid #fff;border-radius:99px;margin:18px 0 10px;overflow:hidden}.bar div{height:100%;background:var(--y);transition:width .3s}.wrap{max-width:1320px;margin:auto;padding:38px 48px 60px}.tools{display:grid;grid-template-columns:1fr auto;gap:24px;margin-bottom:30px}.search{display:flex;align-items:center;padding:0 20px;height:62px;border:3px solid #83bcff;border-radius:20px;background:#fff}.search input{width:100%;border:0;outline:0;font-weight:700;font-size:1.1rem}.filters{display:flex;padding:5px;background:#fff;border:3px solid var(--bb);border-radius:20px}.filters button{border:0;background:none;padding:14px 22px;border-radius:14px;font-weight:900;color:var(--i);cursor:pointer}.filters .active{background:var(--bb);color:#fff}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;align-items:start}.card{background:#fff;border:2px solid #b2d8ff;border-radius:25px;padding:23px;box-shadow:0 8px 0 #c9e4fa}.card h2{margin:0;font-size:1.45rem}.card p{margin:6px 0 18px;font-weight:800;color:#647892}.nums{display:flex;flex-wrap:wrap;gap:10px}.num{width:52px;height:52px;border:3px dashed var(--bb);border-radius:15px;background:#f8fcff;color:var(--i);font-weight:900;cursor:pointer}.num:hover{transform:translateY(-2px)}.num.done{background:var(--g);border-style:solid;border-color:#087b2d;color:#fff;box-shadow:0 4px 0 #08712b}.empty{text-align:center;background:#fff;border-radius:24px;padding:50px;grid-column:1/-1}footer{text-align:center;padding:24px;background:#06347c;color:#fff;font-weight:800;border-top:6px solid var(--y)}button:focus-visible,input:focus-visible{outline:4px solid var(--y);outline-offset:2px}@media(max-width:950px){.hero-in{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.tools{grid-template-columns:1fr}}@media(max-width:620px){.hero-in{padding:34px 20px}.wrap{padding:25px 16px}.grid{grid-template-columns:1fr}.filters button{padding:12px 7px;flex:1}.filters{width:100%}.score{padding:20px}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}

<body>
  <header class="hero"><div class="hero-in"><div><div class="tag">Álbum da Copa 2026</div><h1>Figurinhas que faltam<br><span>para Romeu Ohana</span></h1><p class="hint">Conseguiu uma figurinha? Clique no número para marcar!</p></div><div class="score"><div class="scoreline"><strong id="found">0</strong> de <span id="total">0</span> encontradas 🏆</div><div class="bar"><div id="bar"></div></div><small><span id="missing">0</span> ainda faltam</small></div></div></header>

  <script>
  const teams=[

  const total=teams.reduce((s,t)=>s+t[1].length,0),store="romeu-ohana-figurinhas-v1";let done=new Set(JSON.parse(localStorage.getItem(store)||"[]")),filter="all",query="";const key=(t,n)=>t+":"+n;
  function render(){const grid=document.querySelector("#grid");grid.innerHTML="";let shown=0;for(const [name,nums] of teams){const visible=nums.filter(n=>{const d=done.has(key(name,n));return(filter==="all"||filter==="found"&&d||filter==="missing"&&!d)&&(!query||name.toLocaleLowerCase("pt-BR").includes(query)||String(n)===query)});if(!visible.length)continue;shown++;const left=nums.filter(n=>!done.has(key(name,n))).length,card=document.createElement("article");card.className="card";card.innerHTML=`<h2>${name}</h2><p>${left?left+" faltando":"Tudo completo!"}</p><div class="nums"></div>`;for(const n of visible){const d=done.has(key(name,n)),b=document.createElement("button");b.className="num"+(d?" done":"");b.textContent=d?"✓ "+n:n;b.setAttribute("aria-label",`Figurinha ${n} de ${name}: ${d?"conseguida":"faltando"}`);b.onclick=()=>{d?done.delete(key(name,n)):done.add(key(name,n));localStorage.setItem(store,JSON.stringify([...done]));render()};card.querySelector(".nums").appendChild(b)}grid.appendChild(card)}if(!shown)grid.innerHTML='<div class="empty"><h2>Nenhuma figurinha por aqui</h2><p>Tente outra busca ou outro filtro.</p></div>';document.querySelector("#found").textContent=done.size;document.querySelector("#total").textContent=total;document.querySelector("#missing").textContent=total-done.size;document.querySelector("#bar").style.width=(done.size/total*100)+"%"}
  document.querySelector("#search").oninput=e=>{query=e.target.value.trim().toLocaleLowerCase("pt-BR");render()};document.querySelectorAll("[data-filter]").forEach(b=>b.onclick=()=>{filter=b.dataset.filter;document.querySelectorAll("[data-filter]").forEach(x=>x.classList.toggle("active",x===b));render()});render();
  </script>
